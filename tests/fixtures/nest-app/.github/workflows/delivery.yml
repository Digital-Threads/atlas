name: Delivery
on:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm test
  quality:
    uses: ./.github/workflows/reusable-quality.yml
  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - run: docker build -t registry.example.test/atlas-api:staging .
      - run: docker push registry.example.test/atlas-api:staging
      - run: helm upgrade --install atlas-api ./charts/atlas
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: docker build -t registry.example.test/atlas-api:production .
      - run: docker push registry.example.test/atlas-api:production
      - run: kubectl apply -f k8s/production
