apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: atlas-api
spec:
  source:
    repoURL: https://github.com/example/atlas-api.git
    targetRevision: main
    path: k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
